  build-with-remote-cache-diagnostics:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - activate-build-cache-for-gradle@2: {}
    - script@1:
        inputs:
        - content: |-
