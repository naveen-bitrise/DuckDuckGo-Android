---
format_version: '23'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: android
app:
  envs:
  - TEST_SHARD_COUNT: '2'
  - PROJECT_LOCATION: "./"
    opts:
      is_expand: false
  - MODULE: ad-click/ad-click-api
    opts:
      is_expand: false
  - BITRISE_GIT_COMMIT: ''
    opts:
      is_expand: false
  - BITRISE_BUILD_CACHE_AUTH_TOKEN: <revoked>
    opts:
      is_expand: false
  - BITRISE_BUILD_CACHE_WORKSPACE_ID: c8e286a505ee7c81
    opts:
      is_expand: false
pipelines:
  pipeline-run-instrumented-tests:
    workflows:
      ui-tests-play:
        parallel: '2'
      ui-tests-internal:
        parallel: '2'
  parallel-flag:
    workflows:
      build-with-parallel-flag: {}
      build-without-parallel-flag: {}
  build-cache:
    workflows:
      build-without-cache: {}
      build-with-dependency-cache: {}
      build-with-dep-n-remote-build-caches: {}
      build-will-all-three-caches: {}
  build-cache-analysis:
    workflows:
      build-without-cache: {}
      build-with-dependency-cache: {}
  pipeline-run-unit-tests:
    workflows:
      build-before-test: {}
      unit-tests-sharded:
        depends_on:
        - build-before-test
        parallel: '3'
  pipeline-run-unit-tests-v2:
    workflows:
      unit-tests-sharded:
        parallel: '2'
      unit-tests-no-shards: {}
  Pipeline-Release:
    workflows: {}
  pipeline-run-ui-tests-no-shards:
    workflows:
      ui-tests-play-no-shards: {}
      ui-tests-internal-no-shards: {}
  pipeline-run-unit-tests-v3:
    workflows:
      unit-tests-build-only: {}
      unit-tests-run-tests:
        depends_on:
        - unit-tests-build-only
        parallel: "$TEST_SHARD_COUNT"
workflows:
  build_apk:
    summary: Run your Android unit tests and create an APK file to install your app
      on a device or share it with your team.
    description: The workflow will first clone your Git repository, install Android
      tools, set the project's version code based on the build number, run
      Android lint and unit tests, build the project's APK file and save it.
    steps:
    - git-clone@8: {}
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - change-android-versioncode-and-versionname@1:
        inputs:
        - build_gradle_path: "$PROJECT_LOCATION/$MODULE/build.gradle"
    - android-lint@0:
        inputs:
        - project_location: "$PROJECT_LOCATION"
        - variant: "$VARIANT"
        - cache_level: none
    - android-unit-test@1:
        inputs:
        - project_location: "$PROJECT_LOCATION"
        - variant: "$VARIANT"
        - cache_level: none
    - android-build@1:
        inputs:
        - project_location: "$PROJECT_LOCATION"
        - module: "$MODULE"
        - variant: "$VARIANT"
        - cache_level: none
    - sign-apk@1:
        run_if: '{{getenv "BITRISEIO_ANDROID_KEYSTORE_URL" | ne ""}}'
    - deploy-to-bitrise-io@2: {}
  run_instrumented_tests:
    summary: Run your Android instrumented tests and get the test report.
    description: The workflow will first clone your Git repository, cache your
      Gradle dependencies, install Android tools, run your Android instrumented
      tests and save the test report.
    steps:
    - git-clone@8: {}
    - restore-gradle-cache@2: {}
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - avd-manager@2: {}
    - wait-for-android-emulator@1: {}
    - gradle-runner@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
        - gradle_task: |-
            connectedAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.numShards=$BITRISE_IO_PARALLEL_TOTAL \
              -Pandroid.testInstrumentationRunnerArguments.shardIndex=$BITRISE_IO_PARALLEL_INDEX
    - save-gradle-cache@1: {}
    - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        machine_type_id: g2.linux.x-large
  run_tests:
    summary: Run your Android unit tests and get the test report.
    description: The workflow will first clone your Git repository, cache your
      Gradle dependencies, install Android tools, run your Android unit tests
      and save the test report.
    steps:
    - git-clone@8: {}
    - restore-gradle-cache@2:
        run_if: false
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - bitrise-run@0:
        inputs:
        - workflow_id: run_tests
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
            set -e
            # make pipelines' return status equal the last command to exit with a non-zero status, or zero if all commands exit successfully
            set -o pipefail
            # debug log
            set -x

            # write your script here
            sudo sh -c 'sync; echo 3 > /proc/sys/vm/drop_caches'

            # or run a script from your repository, like:
            # bash ./path/to/script.sh
            # not just bash, e.g.:
            # ruby ./path/to/script.rb
        title: Reclaim space
    - android-unit-test@1: {}
    - script@1:
        inputs:
        - content: "#!/usr/bin/env bash

            # fail if any commands fails

            set -e

            # make pipelines' return status equal the last command to exit with
            a non-zero status, or zero if all commands exit successfully

            set -o pipefail

            # debug log

            set -x


            # write your script here

            ./gradlew jvm_tests

            find . -type d -name 'reports' | zip -@ -r unit-tests-report.zip


            # Move zip to deploy directory so it's available as artifact

            mv unit-tests-report.zip $BITRISE_DEPLOY_DIR/


            # Copy HTML reports to BITRISE_HTML_REPORT_DIR

            # Find all test report directories and copy them with module names
            as subfolders

            find . -path \"*/build/reports/tests/testDebugUnitTest\" -type d |
            while read report_dir; do

            \    if [ -f \"$report_dir/index.html\" ]; then

            \        # Extract module path (e.g., \"autofill/autofill-impl\")

            \        module_path=$(echo \"$report_dir\" | sed
            's|/build/reports/tests/testDebugUnitTest||' | sed 's|^\\./||')

            \        # Create safe directory name by replacing / with -

            \        safe_module_name=$(echo \"$module_path\" | sed 's|/|-|g')

            \       \ 

            \        # Copy entire report directory to BITRISE_HTML_REPORT_DIR
            subfolder

            \        cp -r \"$report_dir\"
            \"$BITRISE_HTML_REPORT_DIR/$safe_module_name\"

            \       \ 

            \        echo \"Copied report: $module_path -> $safe_module_name\"

            \    fi

            done


            echo \"HTML reports structure:\"

            find $BITRISE_HTML_REPORT_DIR -name \"index.html\" -exec echo
            \"Report: {}\" \\;"
        run_if: false
    - save-gradle-cache@1: {}
    - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        machine_type_id: g2.linux.x-large
    triggers:
      pull_request:
      - target_branch: develop
  analysis:
    steps:
    - bundle::build: {}
  build-with-parallel-flag:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -exo pipefail

