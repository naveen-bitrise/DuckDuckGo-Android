  unit-tests-build-only:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - activate-build-cache-for-gradle@2: {}
    - restore-gradle-cache@2: {}
    - script@1:
        title: Compile Code but Skip Tests
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
            set -e
            # make pipelines' return status equal the last command to exit with a non-zero status, or zero if all commands exit successfully
            set -o pipefail
            # debug log
            set -x

            # write your script here
            ./gradlew assembleDebug assembleDebugUnitTest -x test

            # or run a script from your repository, like:
            # bash ./path/to/script.sh
            # not just bash, e.g.:
            # ruby ./path/to/script.rb
    - script@1:
        title: Create Sharded Packages
        inputs:
        - content: "#!/usr/bin/env bash

            # fail if any commands fails

            set -e

            # make pipelines' return status equal the last command to exit with
            a non-zero status, or zero if all commands exit successfully

            set -o pipefail

            # debug log

            set -x

            # Define a function to add files to tar only if they exist

            add_if_exists() {

            \    local files=\"\"

            \    for item in \"$@\"; do

            \        if [ -e \"$item\" ]; then

            \            files=\"$files $item\"

            \        else

            \            # Don't print anything to stdout to avoid contaminating
            the return value

            \            echo \"Skipping non-existent file/directory: $item\"
            >&2

            \        fi

            \    done

            \    echo \"$files\"

            }


            # Get test tasks

            TEST_TASKS=($(./gradlew tasks --all | grep -E \"test.*UnitTest\" |
            awk '{print $1}' | sort))

            echo \"Found ${#TEST_TASKS[@]} test tasks\"


            # Define number of shards

            TOTAL_SHARDS=${TEST_SHARD_COUNT:-2}


            # Create directory for shard artifacts

            mkdir -p shards


            # Calculate tasks per shard

            TASKS_PER_SHARD=$(( (${#TEST_TASKS[@]} + TOTAL_SHARDS - 1) /
            TOTAL_SHARDS ))


            # Prepare each shard

            for SHARD_INDEX in $(seq 0 $((TOTAL_SHARDS-1))); do

            \    # Calculate start and end indices

            \    START_INDEX=$((SHARD_INDEX * TASKS_PER_SHARD))

            \    END_INDEX=$(( START_INDEX + TASKS_PER_SHARD ))

            \   \ 

            \    # Check bounds

            \    if [[ $END_INDEX -gt ${#TEST_TASKS[@]} ]]; then

            \        END_INDEX=${#TEST_TASKS[@]}

            \    fi

            \   \ 

            \    # Create tasks file for this shard

            \    echo \"Creating shard $SHARD_INDEX
            ($START_INDEX-$((END_INDEX-1)))\"

            \    mkdir -p shards/shard_$SHARD_INDEX

            \   \ 

            \    # Write tasks to run for this shard

            \    for i in $(seq $START_INDEX $((END_INDEX-1))); do

            \        echo \"${TEST_TASKS[$i]}\" >>
            shards/shard_$SHARD_INDEX/test_tasks.txt

            \    done

            \   \ 

            \    # Create a runner script for this shard

            \    cat > shards/shard_$SHARD_INDEX/run_tests.sh << 'EOF'

            #!/bin/bash

            # This script runs tests for a specific shard


            # Navigate to the correct directory where gradlew is located

            cd bitrise/src


            # Define the path to test_tasks.txt

            TEST_TASKS_FILE=\"../../test_tasks.txt\"


            # Run the tests without compilation

            TEST_COMMAND=\"./gradlew --stacktrace --info --offline \"


            # Skip compilation steps

            #TEST_COMMAND+=\" -x compileDebugSources -x
            compileDebugUnitTestSources\"


            # Add each test task

            while read TASK; do

            \    # Only include actual test execution tasks, not compile tasks

            \    if [[ \"$TASK\" == *\"test\"*\"UnitTest\" ]]; then

            \        TEST_COMMAND+=\" \\\"$TASK\\\"\"

            \    fi

            done < \"$TEST_TASKS_FILE\"


            echo \"Running command: $TEST_COMMAND\"

            eval $TEST_COMMAND


            EOF

            \    chmod +x shards/shard_$SHARD_INDEX/run_tests.sh

            \   \ 

            \    # Start with the shard directory itself

            \    TAR_BASE_CMD=\"tar -czf shards/shard_${SHARD_INDEX}.tar.gz -C
            shards/shard_$SHARD_INDEX . --transform 's,^,shard_files/,'\"

            \   \ 

            \    # Create lists of files to include

            \    GRADLE_FILES=$(add_if_exists \\

            \        \"$(pwd)/gradlew\" \\

            \        \"$(pwd)/gradle\" \\

            \        \"$(pwd)/gradle.properties\" \\

            \        \"$(pwd)/gradlew.bat\" \\

            \        \"$(pwd)/settings.gradle\" \\

            \        \"$(pwd)/build.gradle\" \\

            \        \"$(pwd)/.gradle\")

            \   \ 

            \    BUILD_DIRS=$(add_if_exists \\

            \        \"$(pwd)/build\" \\

            \        \"$(pwd)/app/build\" \\

            \        \"$(pwd)/app-store/build\" \\

