            \        TEST_DEBUG_DIRS=\"$TEST_DEBUG_DIRS $dir\"

            \    done

            \   \ 

            \    # Build the final command with all existing files/directories

            \    echo \"Creating tar command...\"

            \    ALL_FILES=\"$GRADLE_FILES $BUILD_DIRS $TEST_DIRS
            $TEST_DEBUG_DIRS\"

            \   \ 

            \    if [ -n \"$ALL_FILES\" ]; then

