  unit-tests-run-tests:
    steps:
    - pull-intermediate-files@1: {}
    - activate-build-cache-for-gradle@2: {}
    - restore-gradle-cache@2: {}
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
            set -e
            # make pipelines' return status equal the last command to exit with a non-zero status, or zero if all commands exit successfully
            set -o pipefail
            # debug log
            set -x

            # write your script here
            SHARD_INDEX=${BITRISE_IO_PARALLEL_INDEX:-0}
            echo "This is test VM for shard $SHARD_INDEX"

            # Create work directory
            mkdir -p test_workdir
            cd test_workdir

            # The shards directory is available at $BITRISE_TEST_SHARDS_PATH
            echo "Using shards from: $BITRISE_TEST_SHARDS_PATH"

            # Copy the shard package for this VM's shard index
            echo "Copying shard package for shard $SHARD_INDEX"
            cp "$BITRISE_TEST_SHARDS_PATH/shard_${SHARD_INDEX}.tar.gz" ./shard.tar.gz

            # Extract the shard package
            echo "Extracting shard package"
            tar -xzf shard.tar.gz

            # Run the tests
            echo "Running tests for shard $SHARD_INDEX"
            cd shard_files
            ./run_tests.sh
        run_if: false
