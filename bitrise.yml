        run_if: false
    - script@1:
        title: Create Shard V2
        inputs:
        - content: "#!/bin/bash

            # Sharding for DuckDuckGo Android with project files


            # Get test tasks

            TEST_TASKS=($(./gradlew tasks --all | grep -E \"test.*UnitTest\" |
            awk '{print $1}' | sort))

            echo \"Found ${#TEST_TASKS[@]} test tasks\"


            # Define number of shards

            TOTAL_SHARDS=${TEST_SHARD_COUNT:-2}


            # Create directory for shard artifacts

            mkdir -p shards


            # Calculate tasks per shard

            TASKS_PER_SHARD=$(( (${#TEST_TASKS[@]} + TOTAL_SHARDS - 1) /
            TOTAL_SHARDS ))


            # Create a base project package with minimal files needed to run
            tests

            BASE_PROJECT=\"base-project\"

            mkdir -p $BASE_PROJECT


            # Copy essential project files (adjust based on your project
            structure)

            cp -r gradlew gradlew.bat gradle settings.gradle build.gradle
            $BASE_PROJECT/

            find . -maxdepth 1 -type d -not -path \"./\\.*\" -not -path
            \"./shards\" -not -path \"./$BASE_PROJECT\" -exec cp -r {}
            $BASE_PROJECT/ \\;


            # Copy build directories with compiled classes

            find . -path \"*/build/intermediates/javac\" -type d -exec cp -r {}
            $BASE_PROJECT/ \\;

            find . -path \"*/build/tmp\" -type d -exec cp -r {} $BASE_PROJECT/
            \\;

            find . -path
            \"*/build/intermediates/asm_instrumented_project_classes\" -type d
            -exec cp -r {} $BASE_PROJECT/ \\;


            # Copy .gradle directory for caches

            mkdir -p $BASE_PROJECT/.gradle

            cp -r .gradle/caches $BASE_PROJECT/.gradle/


            echo \"Base project size: $(du -sh $BASE_PROJECT)\"


            # Prepare each shard

            for SHARD_INDEX in $(seq 0 $((TOTAL_SHARDS-1))); do

            \    # Calculate start and end indices

            \    START_INDEX=$((SHARD_INDEX * TASKS_PER_SHARD))

            \    END_INDEX=$(( START_INDEX + TASKS_PER_SHARD ))

            \   \ 

            \    # Check bounds

            \    if [[ $END_INDEX -gt ${#TEST_TASKS[@]} ]]; then

            \        END_INDEX=${#TEST_TASKS[@]}

            \    fi

            \   \ 

            \    # Create tasks file for this shard

            \    echo \"Creating shard $SHARD_INDEX
            ($START_INDEX-$((END_INDEX-1)))\"

            \    mkdir -p shards/shard_$SHARD_INDEX

            \   \ 

            \    # Write tasks to run for this shard

            \    for i in $(seq $START_INDEX $((END_INDEX-1))); do

            \        echo \"${TEST_TASKS[$i]}\" >>
            shards/shard_$SHARD_INDEX/test_tasks.txt

            \    done

            \   \ 

            \    # Create a script to run tests

            \    cat > shards/shard_$SHARD_INDEX/run_tests.sh << 'EOF'

            #!/bin/bash

            # Run tests in the DuckDuckGo Android project


            # Check where we are

            echo \"Current directory: $(pwd)\"


            # Navigate to the project directory

            cd project


            # Run the tests in offline mode

            TEST_COMMAND=\"./gradlew --offline --stacktrace --info\"


            # Add each test task

            while read TASK; do

            \    TEST_COMMAND+=\" \\\"$TASK\\\"\"

            done < ../test_tasks.txt


            echo \"Running command: $TEST_COMMAND\"

            eval $TEST_COMMAND

            EOF

            \    chmod +x shards/shard_$SHARD_INDEX/run_tests.sh

            \   \ 

            \    # Copy the base project to the shard

            \    cp -r $BASE_PROJECT shards/shard_$SHARD_INDEX/project

            \   \ 

            \    # Package this shard

            \    echo \"Packaging shard $SHARD_INDEX...\"

            \    tar -czf shards/shard_${SHARD_INDEX}.tar.gz -C
            shards/shard_$SHARD_INDEX .

            \   \ 

            \    echo \"Created shard $SHARD_INDEX with $(wc -l <
            shards/shard_$SHARD_INDEX/test_tasks.txt) tasks\"

            \    echo \"Shard size: $(du -sh
            shards/shard_${SHARD_INDEX}.tar.gz)\"

            done


            # Set environment variable for the shards directory

            envman add --key BITRISE_TEST_SHARDS_PATH --value \"$(pwd)/shards\""
    - save-gradle-cache@1: {}
    - deploy-to-bitrise-io@2:
        inputs:
        - pipeline_intermediate_files: BITRISE_TEST_SHARDS_PATH
