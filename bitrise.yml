    - git-clone@8: {}
    - activate-build-cache-for-gradle@2: {}
    - restore-gradle-cache@2: {}
    - script@1:
        inputs:
        - content: "#!/usr/bin/env bash

            set -exo pipefail

            \    \ 

            # BITRISE_IO_PARALLEL_INDEX is 1-based, so we can use it directly

            SHARD_INDEX=$BITRISE_IO_PARALLEL_INDEX

            TOTAL_SHARDS=$BITRISE_IO_PARALLEL_TOTAL


            echo \"Running test shard $SHARD_INDEX of $TOTAL_SHARDS\"


            # Use --no-rebuild to skip compilation since we already compiled

            ./gradlew testDebugUnitTest \\

            -PtestShard=$SHARD_INDEX \\

            -PtotalShards=$TOTAL_SHARDS \\

            --rerun

            #--no-rebuild"
        title: Run Tests
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
